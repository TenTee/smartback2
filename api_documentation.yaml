          readOnly: true
        formateur_nom:
          type: string
          readOnly: true
        jour:
          type: string
          maxLength: 20
        heure_debut:
          type: string
          format: time
        heure_fin:
          type: string
          format: time
        salle:
          type: string
          maxLength: 100
        filiere:
          type: integer
          nullable: true
        niveau:
          type: integer
          nullable: true
        classe:
          type: integer
          nullable: true
        module:
          type: integer
        formateur:
          type: integer
