openapi: 3.0.3
info:
  title: SmartCampus API
  version: 1.0.0
  description: API pour la gestion des utilisateurs, rôles, programmes et modules.
paths:
  /api/admin-api/protected/:
    get:
      operationId: admin_api_protected_retrieve
      tags:
      - admin-api
      security:
